# ── Backtester2 Application Configuration ────────────────────────────────────
#
# Strategy-specific settings (PARAM_GRID, DATE_RANGE, entry logic) stay in
# each strategy file. This file holds application-level settings only.
#
# All paths are relative to this file's directory (backtester2/).

# ── Data ──────────────────────────────────────────────────────────────────────
[data]

# Default snapshot parquets fed to the backtest engine.
# Update these when you build a new snapshot set.
options_parquet     = "snapshots/options_20260309_20260323.parquet"
spot_parquet        = "snapshots/spot_track_20260309_20260323.parquet"

# Raw tick data input and snapshot output directories (used by snapshot_builder).
tardis_data_dir     = "tardis_options/data"
snapshots_dir       = "snapshots"
reports_dir         = "reports"

# Snapshot cadences (minutes).
snapshot_interval_min   = 5   # option snapshot grid resolution
spot_interval_min       = 1   # spot OHLC bar resolution

# Parquet output compression codec (zstd recommended for size/speed balance).
parquet_compression = "zstd"

# ── Simulation ────────────────────────────────────────────────────────────────
[simulation]

account_size_usd        = 10_000  # virtual account size (used in equity curve)
progress_interval       = 500     # print engine progress every N market states
top_n_console           = 5       # top combos printed to terminal after run

# ── Pricing ───────────────────────────────────────────────────────────────────
[pricing]

hours_per_year          = 8760.0  # calendar denominator for T in Black-Scholes
risk_free_rate          = 0.0     # r in BS (negligible for sub-24h crypto options)
expiry_hour_utc         = 8       # Deribit 0DTE daily expiry time (UTC)
strike_step_usd         = 500     # Deribit strike grid increment ($)

# Realized-vol estimation window
vol_lookback_candles    = 24      # trailing candles used for realized-vol estimate
min_vol_candles         = 6       # minimum candles required before using realized vol
default_vol             = 0.55    # fallback annualised vol when data is insufficient
gap_reset_seconds       = 7200    # max gap (2 h) before resetting log-return window

# Vol clamps — prevent numerical blowups in Black-Scholes
min_vol                 = 0.15    # floor: 15% annualised
max_vol                 = 3.00    # ceiling: 300% annualised

# ── Fee Model ─────────────────────────────────────────────────────────────────
[fees]

model           = "deribit"   # fee model identifier
index_rate      = 0.0003      # 0.03% of index price (base fee per leg)
price_cap_frac  = 0.125       # capped at 12.5% of the option leg price
